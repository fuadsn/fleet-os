<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fleet Treasury OS</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #f0f6fc; }
    header span { font-size: 12px; color: #8b949e; }
    .badge {
      background: #1f6feb22;
      border: 1px solid #1f6feb44;
      color: #58a6ff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
    }
    .main {
      display: grid;
      grid-template-columns: 260px 1fr 300px;
      flex: 1;
      overflow: hidden;
    }
    .panel {
      border-right: 1px solid #21262d;
      overflow-y: auto;
      padding: 16px;
    }
    .panel:last-child { border-right: none; }
    .panel-title {
      font-size: 11px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    /* Operator cards */
    .operator-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .operator-card:hover { border-color: #58a6ff44; }
    .operator-card.active { border-color: #58a6ff; }
    .op-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .op-meta { font-size: 11px; color: #8b949e; margin-bottom: 8px; }
    .op-kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .kpi { background: #0d1117; border-radius: 4px; padding: 6px 8px; }
    .kpi-val { font-size: 14px; font-weight: 700; }
    .kpi-lbl { font-size: 10px; color: #8b949e; }
    .kpi-val.red   { color: #f85149; }
    .kpi-val.green { color: #3fb950; }
    .kpi-val.yellow{ color: #d29922; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: 4px;
    }
    .dot-red    { background: #f85149; }
    .dot-green  { background: #3fb950; }
    .dot-yellow { background: #d29922; }

    /* Center panel */
    .center-panel { padding: 20px; overflow-y: auto; }
    .section-title {
      font-size: 14px; font-weight: 600;
      margin-bottom: 16px; color: #f0f6fc;
    }
    .chart-wrap { height: 180px; margin-bottom: 24px; }

    /* Trace panel */
    .trace-container {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 14px;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 12px;
      min-height: 200px;
      margin-bottom: 16px;
    }
    .trace-step {
      padding: 4px 0;
      border-bottom: 1px solid #21262d22;
      color: #8b949e;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .trace-step.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .trace-step .arrow { color: #58a6ff; margin-right: 6px; }
    .trace-step .highlight { color: #3fb950; }
    .trace-step .warning  { color: #f85149; }
    .trace-step .neutral  { color: #e6edf3; }

    /* Run button */
    .run-btn {
      background: #238636;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .run-btn:hover   { background: #2ea043; }
    .run-btn:disabled{ background: #21262d; color: #8b949e; cursor: not-allowed; }

    /* Outcome card */
    .outcome-card {
      background: #161b22;
      border-radius: 8px;
      padding: 14px;
      border: 1px solid #21262d;
      margin-bottom: 12px;
    }
    .outcome-card.disbursed   { border-color: #3fb95044; }
    .outcome-card.pending     { border-color: #d2992244; }
    .outcome-card.withheld    { border-color: #f8514944; }
    .outcome-title { font-size: 12px; font-weight: 700; margin-bottom: 8px; }
    .outcome-detail { font-size: 12px; color: #8b949e; line-height: 1.6; }

    /* Officer queue */
    .queue-card {
      background: #161b22;
      border: 1px solid #d2992233;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .queue-title { font-size: 12px; font-weight: 600; margin-bottom: 6px; }
    .queue-meta  { font-size: 11px; color: #8b949e; margin-bottom: 10px; line-height: 1.6; }
    .btn-row { display: flex; gap: 6px; }
    .btn-approve {
      background: #238636; color: white; border: none;
      padding: 5px 12px; border-radius: 4px; font-size: 11px;
      cursor: pointer; flex: 1; font-weight: 600;
    }
    .btn-reject {
      background: transparent; color: #f85149;
      border: 1px solid #f8514944;
      padding: 5px 12px; border-radius: 4px; font-size: 11px;
      cursor: pointer;
    }

    /* Audit log */
    .audit-item {
      font-size: 11px; font-family: monospace;
      color: #8b949e; padding: 4px 0;
      border-bottom: 1px solid #21262d33;
    }
    .empty-state { color: #8b949e; font-size: 12px; text-align: center; padding: 24px; }
  </style>
</head>
<body>

<header>
  <h1>Fleet Treasury OS</h1>
  <span class="badge">Pine Labs Hackathon Demo</span>
  <span style="margin-left:auto; font-size:12px; color:#8b949e" id="server-status">
    connecting...
  </span>
</header>

<div class="main">

  <!-- LEFT: Operator list -->
  <div class="panel">
    <div class="panel-title">Fleet Operators</div>
    <div id="operator-list">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <!-- CENTER: Briefing + Agent trace -->
  <div class="center-panel">
    <div id="center-content">
      <div class="empty-state" style="margin-top: 80px">
        Select an operator to view briefing
      </div>
    </div>
  </div>

  <!-- RIGHT: Officer queue -->
  <div class="panel" style="border-right:none; border-left: 1px solid #21262d;">
    <div class="panel-title">Officer Queue</div>
    <div id="officer-queue">
      <div class="empty-state">No pending approvals</div>
    </div>
    <div class="panel-title" style="margin-top:20px">Audit Log</div>
    <div id="audit-log">
      <div class="empty-state">Run an agent to see log</div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
